format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$gradle\
$java\
$nodejs\
$rust\
$python\
$terraform\
$package\
$line_break\
$character
"""
# right_format = """
# """

add_newline = true

[os]
#style = "bg:#9A348E"
disabled = true

[os.symbols]
#Macos = "оң‘ оҳө оҠһ пҢӮ у°Җө"
Macos = "пҢӮ "
Windows = "оҳӘ "

[directory]
style = "blue"
truncation_length = 10
truncation_symbol = "вҖҰ/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у°Ҳҷ"
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](green)"

[git_branch]
symbol = ""
# symbol = "оӮ "
format = '[$symbol$branch(:$remote_branch) ]($style)'
style = "green"

[git_status]
up_to_date = ' п’Ө'
#up_to_date = 'вң“ п’һ п’Ө '
conflicted = "вҡ”пёҸ"
ahead = "п…¶ Г—${count}"
behind = "п…ө Г—${count}"
diverged = "о®» Г—${вҶ‘ahead_count}Г—${вҶ“behind_count}"
untracked = "п„ЁГ—${count}"
stashed = "о¬© "
modified = "пҒ„ Г—${count}"
staged = "о«¶ Г—${count}"
renamed = "о«Җ Г—${count}"
deleted = "пҮё Г—${count}"
style = "yellow"
format = '[$all_status$ahead_behind ]($style)'

[git_state]
rebase ="REBASING"
merge = "MERGING"
revert = "REVERTING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
cherry_pick = '[оҠӣ PICKING](bold red)'
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
added_style = "yellow"
deleted_style = "yellow"
disabled = false
format = '([+$added]($added_style))([,-$deleted]($deleted_style))'

[java]
symbol = "оү–"
detect_extensions = [ "java", "class", "jar", "gradle", "clj", "cljc" ]
detect_files = ['pom.xml', 'build.gradle.kts', 'build.sbt', '.java-version', 'deps.edn', 'project.clj', 'build.boot', '.sdkmanrc']
#style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[package]
symbol = "п…«"
#symbol = ""
#style = "bg:#86BBD8"
format = '[$symbol $version]($style)'

[nodejs]
detect_extensions = ['js', 'mjs', 'cjs', 'ts', 'mts', 'cts']
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
not_capable_style = 'bold red'
symbol = "оңҳ"
# style = "bg:#86BBD8"
format = '[ $symbol ($version) ($engines_version)]($style)'

[rust]
detect_extensions =[ "rs" ]
detect_files =[ "Cargo.toml" ]
symbol = "оһЁ"
# style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[terraform]
symbol = "оҡҡ"
# style = "bg:#86BBD8"
format = '[$symbol $version$workspace]($style) '

[python]
python_binary = ['python', 'python3', 'python2']
detect_extensions =[ "py" ]
detect_files = [ "requirements.txt", ".python-version", "pyproject.toml", "Pipfile", "tox.ini", "setup.py", "__init__.py" ]
symbol = "оҳҶ"
# style = "bg:#86BBD8"
format = '[${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[gradle]
symbol = "оҷ "
# style = "bg:#86BBD8"
format = '[ $symbol($version) ]($style)'

[nim]
symbol = "у°ҶҘ"
# style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оң·"
# style = "bg:#86BBD8"
format = '[$symbol ($version) ]($style)'

[c]
symbol = "оҳһ "
# style = "bg:#86BBD8"
format = '[ $symbol($version) ]($style)'

[elixir]
symbol = "оүө "
# style = "bg:#86BBD8"
format = '[ $symbol($version) ]($style)'

[elm]
symbol = "оҳ¬ "
# style = "bg:#86BBD8"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = "оҳ§"
# style = "bg:#86BBD8"
format = '[ $symbol ($version)]($style)'

[haskell]
symbol = "оқ·"
# style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ"
# style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[cmd_duration]
min_time = 10
show_milliseconds = true
show_notifications = true
format = "[$duration]($style)"
style = "yellow"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "white"
# format = '[уұ‘Қ $time]($style)'
format = '[$time]($style)'

[profiles]
transient = """$time $character"""